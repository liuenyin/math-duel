# render.yaml — Render Blueprint for Math Duel
# This file defines both services for one-click deploy

services:
  # Backend — Node.js Web Service
  - type: web
    name: math-duel-backend
    runtime: node
    region: singapore  # 亚洲节点，国内访问更快
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: GEMINI_API_KEY
        sync: false  # 在 Render Dashboard 手动设置
      - key: GEMINI_BASE_URL
        sync: false
      - key: NODE_ENV
        value: production

  # Frontend — Static Site
  - type: web
    name: math-duel-frontend
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        sync: false  # 在 Render Dashboard 设置为后端的 URL
